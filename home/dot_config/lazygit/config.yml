# lazygit config — managed by chezmoi.
gui:
  theme:
    activeBorderColor:
      - cyan
      - bold
    inactiveBorderColor:
      - white
  showCommandLog: true
  showIcons: true
  nerdFontsVersion: "3"
git:
  paging:
    colorArg: always
    pager: delta --paging=never
  commit:
    signOff: false
  autoFetch: true
  autoRefresh: true
update:
  method: prompt
